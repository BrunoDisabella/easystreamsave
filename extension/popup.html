<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Easy Stream Save</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <header>
      <img src="icons/icon-32.svg" alt="" width="32" height="32">
      <div>
        <h1>Easy Stream Save</h1>
        <p id="summary">Scanning this tab</p>
      </div>
    </header>

    <main>
      <section class="notice" aria-label="Download limits">
        <strong>YouTube downloads are not supported</strong>
        <span>Chrome Web Store rules and protected streams can block some videos.</span>
      </section>
      <div id="mediaList" class="media-list"></div>
      <div id="emptyState" class="empty">
        <strong>No media detected yet</strong>
        <span>Play the video or refresh the page, then check again.</span>
      </div>
    </main>

    <footer>
      <button id="refreshButton" type="button">Refresh</button>
      <button id="clearButton" type="button">Clear</button>
    </footer>

    <script src="popup.js"></script>
  </body>
</html>
